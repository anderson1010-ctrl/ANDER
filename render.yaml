services:
  - type: web
    name: ander-app
    env: node
    plan: free
    region: oregon
    repo: https://github.com/anderson1010-ctrl/ANDER
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: ${DB_HOST}
      - key: DB_PORT
        value: ${DB_PORT}
      - key: DB_USER
        value: ${DB_USER}
      - key: DB_PASSWORD
        value: ${DB_PASSWORD}
      - key: DB_NAME
        value: ${DB_NAME}
      - key: FRONTEND_ORIGIN
        value: ${FRONTEND_ORIGIN}
